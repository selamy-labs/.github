name: Python CI

# Reusable lint + test + coverage workflow for Selamy Labs Python repositories
# (#711 OSS-excellence bar — define CI once, call it everywhere).
#
# Usage in a repo's own workflow:
#
#   jobs:
#     test:
#       uses: selamy-labs/.github/.github/workflows/python-ci.yml@main
#       with:
#         coverage-fail-under: 95   # optional, default 90
#
# The resulting required check is "test / Test" (caller-job / this-job).

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to test against.
        type: string
        default: "3.12"
      install-extra:
        description: The pyproject optional-dependency group to install (e.g. "test").
        type: string
        default: "test"
      coverage-fail-under:
        description: Minimum total coverage percent; the job fails below it.
        type: number
        default: 90

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install
        run: python -m pip install -e ".[${{ inputs.install-extra }}]"
      - name: Style
        run: |
          ruff format --check .
          ruff check .
      - name: Test
        run: |
          coverage run -m pytest
          coverage report --fail-under=${{ inputs.coverage-fail-under }}
