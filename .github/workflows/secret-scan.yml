name: Secret Scan

# Reusable PR-diff secret-scanning gate for Selamy Labs repositories
# (laneq #850/#857/#209 — fail CI when a NEW commit introduces a plaintext
# credential; define the gate once, call it everywhere).
#
# Design notes:
#   - Uses the gitleaks CLI directly (Apache-2.0, no license key), NOT the
#     gitleaks-action (which requires a paid GITLEAKS_LICENSE for org repos).
#   - PR-diff mode: scans ONLY the commits introduced by the PR
#     (merge-base..HEAD) via `git log` / `--log-opts`, so pre-existing,
#     already-committed secrets do NOT block new PRs. The gate protects
#     against NEW leaks only.
#   - On push events it scans the pushed range (before..after) as a backstop.
#   - Config: by default uses this org's shared .gitleaks.toml fetched from
#     selamy-labs/.github. A repo can override by committing its own
#     .gitleaks.toml at its root (set use-repo-config: true).
#
# Usage in a repo's own workflow (.github/workflows/secret-scan.yml):
#
#   name: Secret Scan
#   on:
#     pull_request:
#     push:
#       branches: [main]
#   permissions:
#     contents: read
#   jobs:
#     secret-scan:
#       uses: selamy-labs/.github/.github/workflows/secret-scan.yml@main
#
# The resulting required check is "secret-scan / Scan" (caller-job / this-job).

on:
  workflow_call:
    inputs:
      gitleaks-version:
        description: gitleaks CLI version (without leading v).
        type: string
        default: "8.30.1"
      use-repo-config:
        description: >-
          Use the calling repo's own root .gitleaks.toml instead of the shared
          org config. Set true when a repo needs custom allowlists.
        type: boolean
        default: false
      config-ref:
        description: Ref of selamy-labs/.github to fetch the shared config from.
        type: string
        default: "main"
      runner:
        description: >-
          runs-on label. Defaults to the Speedforge self-hosted pool so the gate
          runs without GitHub-hosted Actions billing (the fleet is migrated off
          ubuntu-latest). Cross-org callers (e.g. Matchpoint-AI) override this
          with their own runner label.
        type: string
        default: speedforge

permissions:
  contents: read

jobs:
  scan:
    name: Scan
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout (full history for diff range)
        uses: actions/checkout@v4
        with:
          # gitleaks needs the commits in the PR/push range; merge-base must
          # be reachable, so fetch full history.
          fetch-depth: 0

      - name: Install gitleaks CLI
        run: |
          set -euo pipefail
          VER="${{ inputs.gitleaks-version }}"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Resolve gitleaks config
        id: cfg
        run: |
          set -euo pipefail
          if [ "${{ inputs.use-repo-config }}" = "true" ] && [ -f .gitleaks.toml ]; then
            echo "path=.gitleaks.toml" >> "$GITHUB_OUTPUT"
            echo "Using repo-local .gitleaks.toml"
          else
            curl -sSL \
              "https://raw.githubusercontent.com/selamy-labs/.github/${{ inputs.config-ref }}/.gitleaks.toml" \
              -o .gitleaks.shared.toml
            echo "path=.gitleaks.shared.toml" >> "$GITHUB_OUTPUT"
            echo "Using shared selamy-labs/.github .gitleaks.toml"
          fi

      - name: Compute scan range
        id: range
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            # Use merge-base so we only scan commits the PR actually adds, even
            # if base advanced after the PR was opened.
            MB="$(git merge-base "$BASE" "$HEAD" || echo "$BASE")"
            echo "log_opts=${MB}..${HEAD}" >> "$GITHUB_OUTPUT"
            echo "Scanning PR range ${MB}..${HEAD}"
          else
            BEFORE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            # New branch / unknown before -> scan just the tip commit.
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] \
               || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              echo "log_opts=-1 ${HEAD}" >> "$GITHUB_OUTPUT"
              echo "Scanning single push commit ${HEAD}"
            else
              echo "log_opts=${BEFORE}..${HEAD}" >> "$GITHUB_OUTPUT"
              echo "Scanning push range ${BEFORE}..${HEAD}"
            fi
          fi

      - name: gitleaks (PR-diff mode)
        run: |
          set -euo pipefail
          ./gitleaks git . \
            --config "${{ steps.cfg.outputs.path }}" \
            --log-opts "${{ steps.range.outputs.log_opts }}" \
            --no-banner \
            --redact \
            --verbose
          echo "No new secrets detected in the scanned range."
